<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>xatspace: maiden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Overwatch cursor -->
  <link rel="stylesheet" href="https://cdn.cursors-4u.net/cursors/animated/overwatch-working-in-background-3ef963f5-64.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

    /* ===== Snowfall ===== */
    @keyframes snowFall {
      0%   { transform: translateY(-10vh) translateX(0); }
      50%  { transform: translateY(50vh)  translateX(var(--drift)); }
      100% { transform: translateY(110vh) translateX(0); }
    }
    .snowflake {
      position: absolute; top: -10vh; background: white; border-radius: 50%;
      pointer-events: none; animation: snowFall linear infinite; filter: blur(1px);
    }

    /* ===== Rune particles floating up ===== */
    @keyframes runeFloat {
      0%   { transform: translateY(0)    translateX(0)          rotate(0deg);   opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 0.7; }
      100% { transform: translateY(-90vh) translateX(var(--sway)) rotate(360deg); opacity: 0; }
    }
    .rune-particle {
      position: absolute; bottom: -5vh; pointer-events: none;
      animation: runeFloat ease-in infinite;
      font-size: var(--rsize);
      filter: drop-shadow(0 0 6px var(--rglow));
    }

    /* ===== Spinning avatar border ===== */
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Rainbow shimmer text ===== */
    @keyframes shimmer {
      0%   { background-position: 0%   50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0%   50%; }
    }
    @keyframes textPulse {
      0%, 100% { letter-spacing: 0.05em; }
      50%       { letter-spacing: 0.12em; }
    }
    .shimmer-text {
      background: linear-gradient(90deg,
        #ff9de2, #ffcf8e, #fffb8e, #8effd7,
        #8ecfff, #c18eff, #ff9de2, #ffcf8e
      );
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease infinite, textPulse 2s ease-in-out infinite;
      font-weight: 600;
    }

    /* ===== Layout ===== */
    .page {
      min-height: 100vh; position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 16px;
      background-image: url("https://images.weserv.nl/?q=80&url=https://xatimg.com/image/n4RJMGoxvRZm.png");
      background-size: cover; background-position: center; background-attachment: fixed;
    }
    .snow-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .rune-layer { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .overlay    { position: absolute; inset: 0; background: rgba(255,255,255,.20); }

    .cursor-dot { display: none; }

    main { position: relative; z-index: 10; width: 100%; max-width: 672px; }

    .card {
      border-radius: 16px; padding: 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
      border: 1px solid rgba(255,255,255,.20);
      background-color: rgba(255,255,255,.9);
      backdrop-filter: blur(8px);
      background-image: url("https://images.weserv.nl/?q=80&url=https://xatimg.com/image/nv1P3T6nlv3Q.png");
      background-size: cover; background-position: center;
    }
    @media (min-width: 768px) { .card { padding: 48px; } }

    .header { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 32px; }

    .avatar-wrap {
      flex-shrink: 0; position: relative;
      width: 112px; height: 112px;
      border-radius: 16px; padding: 3px; overflow: hidden;
      box-shadow: 0 6px 20px rgba(91,159,216,.35), 0 0 15px rgba(232,180,212,.25), inset 0 1px 2px rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
    }
    .avatar-spin {
      position: absolute; inset: -100%;
      animation: spin 4s linear infinite;
      background: conic-gradient(rgb(91,159,216), rgb(232,180,212), rgb(91,159,216), rgb(232,180,212), rgb(91,159,216));
    }
    .avatar-img {
      position: relative; width: 100%; height: 100%;
      border-radius: 13px; object-fit: cover; object-position: center 30%;
      box-shadow: 0 2px 8px rgba(0,0,0,.2); opacity: .9;
      background-color: rgb(98,152,214);
    }

    .info { flex: 1; padding-top: 4px; }
    .name { font-size: 2.5rem; font-weight: 700; margin-bottom: 2px; color: rgb(91,159,216); }
    @media (min-width: 768px) { .name { font-size: 3rem; } }
    .xat-id { font-size: 1rem; font-weight: 500; color: rgb(91,159,216); }
    .badges { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .badge { padding: 2px 8px; border-radius: 8px; font-size: 10px; font-weight: 600; }
    .badge-24 { background-color: rgb(232,180,212); color: white; }
    .badge-on { background-color: rgb(76,175,80); color: white; text-transform: uppercase; letter-spacing: .05em; }

    .divider { height: 1px; margin: 24px 0; background-color: rgba(91,159,216,.2); }

    .quote-en { font-size: 1rem; line-height: 1.75; color: rgb(107,143,184); }
    @media (min-width: 768px) { .quote-en { font-size: 1.125rem; } }

    .quote-th {
      padding: 20px; border-radius: 8px; text-align: center;
      background-color: rgba(91,159,216,.08);
      border-left: 3px solid rgb(91,159,216);
      font-family: "Noto Sans Thai", sans-serif;
      font-weight: 500; line-height: 1.8;
    }

    .footer-note { text-align: center; color: rgb(91,159,216); font-weight: 500; font-size: 11px; }

    /* hidden YouTube iframe */
    .yt-hidden { position: fixed; bottom: -9999px; left: -9999px; width: 1px; height: 1px; pointer-events: none; opacity: 0; }
  </style>
</head>
<body>

<!-- Hidden YouTube autoplay via IFrame API -->
<div id="yt-wrap" style="position:fixed;bottom:-9999px;left:-9999px;width:1px;height:1px;overflow:hidden;pointer-events:none;opacity:0;">
  <div id="ytPlayer"></div>
</div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
var ytReady = false;
var player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('ytPlayer', {
    height: '1', width: '1',
    videoId: '6Ro7NubzE9A',
    playerVars: {
      autoplay: 1,
      loop: 1,
      playlist: '6Ro7NubzE9A',
      controls: 0,
      mute: 0,
      playsinline: 1
    },
    events: {
      onReady: function(e) {
        ytReady = true;
        e.target.setVolume(70);
        e.target.playVideo();
      },
      onStateChange: function(e) {
        if (e.data === YT.PlayerState.ENDED) {
          e.target.playVideo();
        }
      }
    }
  });
}

// Unlock on first user gesture (handles browser autoplay block)
function unlockAudio() {
  if (player && player.playVideo) {
    player.unMute && player.unMute();
    player.playVideo();
  }
  document.removeEventListener('click', unlockAudio);
  document.removeEventListener('keydown', unlockAudio);
  document.removeEventListener('touchstart', unlockAudio);
}
document.addEventListener('click', unlockAudio);
document.addEventListener('keydown', unlockAudio);
document.addEventListener('touchstart', unlockAudio);
</script>

<div class="page" id="page">
  <div class="snow-layer" id="snowLayer"></div>
  <div class="rune-layer" id="runeLayer"></div>
  <div class="overlay"></div>

  <main>
    <div class="card">
      <!-- Header -->
      <div class="header">
        <div class="avatar-wrap">
          <div class="avatar-spin"></div>
          <img class="avatar-img"
            src="https://s.imgz.io/2026/06/11/ChatGPT_Image_Dec_30__2025__08_27_36_AM-removebg-previewcc8508aee03dd7f8.png"
            alt="maiden"
            width="112" height="112">
        </div>
        <div class="info">
          <h1 class="name">maiden</h1>
          <div class="xat-id">(PLAYERHATE)</div>
          <div class="badges">
            <span class="badge badge-24">24/7</span>
            <span class="badge badge-on">online</span>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- Thai quote (now in en slot) -->
      <div style="margin-bottom:32px">
        <p class="quote-en">ไม่มีใครเก่งตั้งแต่เกิด แต่ถ้าอยากเกิดก็เปิดมา</p>
      </div>

      <div class="divider"></div>

      <!-- Shimmer Thai text -->
      <div class="quote-th">
        <span class="shimmer-text">หว่อ เมิน อี้ ฉี่ เสวีย มาว เจี้ยว อี้ ฉี่ เมียว เมียว เมียว เมียว เมียว</span>
      </div>

      <div class="divider"></div>

      <p class="footer-note">ที่พูดนี่เข้าใจปะ ?</p>
    </div>
  </main>
</div>

<script>
/* ---- Snowflakes (150 flakes) ---- */
const snowLayer = document.getElementById('snowLayer');
for (let i = 0; i < 150; i++) {
  const el = document.createElement('div');
  el.className = 'snowflake';
  const size = 2 + Math.random() * 5;
  el.style.cssText = `
    left:${Math.random()*100}%;
    width:${size}px;height:${size}px;
    opacity:${0.25+Math.random()*0.6};
    animation-duration:${8+Math.random()*12}s;
    animation-delay:${-(Math.random()*20)}s;
    --drift:${(Math.random()-0.5)*50}px;
  `;
  snowLayer.appendChild(el);
}

/* ---- Rune particles ---- */
const runeLayer = document.getElementById('runeLayer');
const RUNES = ['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛜ','ᛞ','ᛟ','☽','✦','⊕','⊗','⌘'];
const GOLD = ['#FFD700','#FFA500','#FFAA00','#FF8C00','#FFB347','#FFC200','#FF6B00','#FFDD44'];
for (let i = 0; i < 40; i++) {
  const el = document.createElement('div');
  el.className = 'rune-particle';
  const color = GOLD[Math.floor(Math.random()*GOLD.length)];
  const size = 0.7 + Math.random() * 1.4;
  el.textContent = RUNES[Math.floor(Math.random()*RUNES.length)];
  el.style.cssText = `
    left:${Math.random()*100}%;
    --sway:${(Math.random()-0.5)*120}px;
    --rsize:${size}rem;
    --rglow:${color};
    color:${color};
    animation-duration:${7+Math.random()*10}s;
    animation-delay:${-(Math.random()*15)}s;
  `;
  runeLayer.appendChild(el);
}

</script>
</body>
</html>
